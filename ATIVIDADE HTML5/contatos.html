<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contatos</title>
    <link rel="stylesheet" href="contatos.css">
</head>
<body>
    <h1 class="paragrafos">Contato</h1>

<p>Preencha o formulário abaixo e entraremos em contato com você:</p>


<div class="form-contato">
    <label for="nome">Nome:</label><br>
    <input type="text" id="nome" name="nome" placeholder="Seu nome" required><br><br>

    <label for="email">Email:</label><br>
    <input type="email" id="email" name="email" placeholder="seu@email.com" required><br><br>

    <label for="mensagem">Mensagem:</label><br>
    <textarea id="mensagem" name="mensagem" placeholder="Escreva sua mensagem..." rows="5" required></textarea><br><br>

    <button type="submit">Enviar</button>
</div>

<h2 class="paragrafos">Nosso endereço</h2>
<img src="https://t2.tudocdn.net/603541?w=1920" alt="Mapa da localização da loja Urban Style" width="500">
    
</body>
</html>
